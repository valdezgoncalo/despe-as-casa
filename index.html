<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Financeira Pro 2026</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #e74c3c;
            --success: #27ae60;
            --warning: #f39c12;
            --light: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); }
        
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { padding: 20px; border-radius: 8px; text-align: center; color: white; }
        .card.catia { background: #9b59b6; }
        .card.goncalo { background: #3498db; }
        .card.balance { background: var(--primary); }
        .card p { font-size: 1.5em; margin: 10px 0 0; font-weight: bold; }

        .form-section { border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        
        form { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        input, select, button { padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        
        .btn-add { background: var(--success); color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-undo { background: var(--warning); color: white; border: none; cursor: pointer; }
        
        .category-manager { margin-top: 20px; padding: 10px; background: #eee; border-radius: 4px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: var(--primary); color: white; }
        .catia-text { color: #9b59b6; font-weight: bold; }
        .goncalo-text { color: #3498db; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Gestão Financeira 2026</h1>

    <div class="dashboard">
        <div class="card catia"><h3>Cátia Pagou</h3><p id="totalCatia">0,00 €</p></div>
        <div class="card goncalo"><h3>Gonçalo Pagou</h3><p id="totalGoncalo">0,00 €</p></div>
        <div class="card balance"><h3>Saldo de Acerto</h3><p id="finalBalance">0,00 €</p></div>
    </div>

    <div class="form-section">
        <div class="controls">
            <button class="btn-undo" onclick="undoLast()">↩ Anular Último (Undo)</button>
        </div>

        <form id="financeForm">
            <input type="number" id="day" placeholder="Dia" required min="1" max="31">
            <select id="month">
                <option value="Janeiro">Janeiro</option>
                <option value="Fevereiro">Fevereiro</option>
                <option value="Março">Março</option>
            </select>
            <select id="categorySelect" required></select>
            <input type="text" id="description" placeholder="Descrição" required>
            <input type="number" step="0.01" id="amount" placeholder="Valor (€)" required>
            <select id="payer">
                <option value="Catia">Pago por Cátia</option>
                <option value="Goncalo">Pago por Gonçalo</option>
            </select>
            <button type="submit" class="btn-add">Adicionar</button>
        </form>
    </div>

    <div class="category-manager">
        <strong>Gerir Categorias:</strong>
        <input type="text" id="newCatInput" placeholder="Nova categoria...">
        <button onclick="addCategory()">+</button>
        <div id="catList" style="margin-top: 5px; font-size: 0.8em; color: #666;"></div>
    </div>

    <table id="recordsTable">
        <thead>
            <tr>
                <th>Data</th>
                <th>Categoria</th>
                <th>Descrição</th>
                <th>Valor</th>
                <th>Quem Pagou</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    let records = JSON.parse(localStorage.getItem('financas_v2_data')) || [];
    let categories = JSON.parse(localStorage.getItem('financas_v2_cats')) || ['Casa', 'Alimentação', 'Transporte', 'Lazer'];

    const form = document.getElementById('financeForm');
    const catSelect = document.getElementById('categorySelect');
    const catListDiv = document.getElementById('catList');

    function updateUI() {
        // Atualizar Dropdown e Lista de Categorias
        catSelect.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
        catListDiv.innerText = "Categorias atuais: " + categories.join(', ');

        // Atualizar Tabela
        const tableBody = document.querySelector('#recordsTable tbody');
        tableBody.innerHTML = '';
        let totalC = 0, totalG = 0;

        records.forEach((r, index) => {
            if (r.payer === 'Catia') totalC += parseFloat(r.amount);
            else totalG += parseFloat(r.amount);

            tableBody.innerHTML += `<tr>
                <td>${r.day}/${r.month}</td>
                <td><small>${r.category}</small></td>
                <td>${r.description}</td>
                <td>${parseFloat(r.amount).toFixed(2)} €</td>
                <td class="${r.payer.toLowerCase()}-text">${r.payer}</td>
                <td><button onclick="deleteRecord(${index})" style="background:none; border:none; color:red; cursor:pointer;">🗑️</button></td>
            </tr>`;
        });

        // Atualizar Dashboard
        document.getElementById('totalCatia').innerText = totalC.toFixed(2) + ' €';
        document.getElementById('totalGoncalo').innerText = totalG.toFixed(2) + ' €';
        
        const diff = (totalC - totalG) / 2;
        const balanceEl = document.getElementById('finalBalance');
        if (diff > 0) balanceEl.innerText = `Gonçalo deve ${diff.toFixed(2)} €`;
        else if (diff < 0) balanceEl.innerText = `Cátia deve ${Math.abs(diff).toFixed(2)} €`;
        else balanceEl.innerText = '0,00 €';

        localStorage.setItem('financas_v2_data', JSON.stringify(records));
        localStorage.setItem('financas_v2_cats', JSON.stringify(categories));
    }

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        records.push({
            day: document.getElementById('day').value,
            month: document.getElementById('month').value,
            category: catSelect.value,
            description: document.getElementById('description').value,
            amount: document.getElementById('amount').value,
            payer: document.getElementById('payer').value
        });
        updateUI();
        form.reset();
    });

    function addCategory() {
        const val = document.getElementById('newCatInput').value.trim();
        if (val && !categories.includes(val)) {
            categories.push(val);
            document.getElementById('newCatInput').value = '';
            updateUI();
        }
    }

    function undoLast() {
        if (records.length > 0) {
            if (confirm("Deseja anular o último registo inserido?")) {
                records.pop();
                updateUI();
            }
        }
    }

    function deleteRecord(index) {
        records.splice(index, 1);
        updateUI();
    }

    updateUI();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WalletFlow Pro 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #7209b7;
            --success: #4cc9f0;
            --danger: #f72585;
            --bg: #f8f9fc;
            --card-bg: #ffffff;
            --text-main: #2b2d42;
            --text-muted: #8d99ae;
        }

        * {
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            color: var(--text-main);
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-weight: 700;
            color: var(--primary);
            margin: 0;
            letter-spacing: -1px;
        }

        /* Dashboard de Resumo */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.8);
        }

        .card h3 {
            margin: 0;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .card p {
            margin: 10px 0 0;
            font-size: 1.6rem;
            font-weight: 700;
        }

        .card.balance {
            background: var(--primary);
            color: white;
        }

        .card.balance h3, .card.balance p {
            color: white;
        }

        /* Layout em Grelha */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        h2 {
            font-size: 1.1rem;
            margin: 0 0 20px 0;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
        }

        /* Formulários e Inputs */
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 15px;
            width: 100%;
        }

        .form-group {
            flex: 1;
            min-width: 140px;
        }

        .form-group.small {
            flex: 0 0 80px;
            min-width: 80px;
        }

        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.9rem;
            background: #f8fafc;
            color: var(--text-main);
        }

        input:focus, select:focus {
            border-color: var(--primary);
            outline: none;
            background: #fff;
        }

        /* Botões */
        button {
            padding: 12px 18px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
        }

        .btn-danger {
            background: #fff5f5;
            color: #f56565;
            font-size: 0.8rem;
            border: 1px solid #fed7d7;
        }

        .btn-danger:hover {
            background: #f56565;
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #e2e8f0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        /* Gestores de Listas (Configurações) */
        .list-manager {
            max-height: 150px;
            overflow-y: auto;
            background: #fbfcfe;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #edf2f7;
            margin-top: 5px;
        }

        .list-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        /* Tabela de Registos */
        .table-container {
            background: white;
            border-radius: 20px;
            overflow-x: auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th {
            background: #f8fafc;
            padding: 15px;
            text-align: left;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.85rem;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            background: #e0e7ff;
            color: #4338ca;
        }

        /* Orçamentos Visuais */
        .budget-card {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid #eee;
        }

        .progress-bg {
            background: #e2e8f0;
            height: 8px;
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            background: var(--success);
            width: 0%;
            transition: width 0.4s ease;
        }

        .progress-fill.over {
            background: var(--danger);
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>WalletFlow 2026</h1>
    </header>

    <div class="dashboard">
        <div class="card" style="border-left: 5px solid #9b59b6;">
            <h3 id="labelU1">Pessoa 1</h3>
            <p id="valU1">0,00 €</p>
        </div>
        <div class="card" style="border-left: 5px solid var(--primary);">
            <h3 id="labelU2">Pessoa 2</h3>
            <p id="valU2">0,00 €</p>
        </div>
        <div class="card balance">
            <h3 id="labelBalance">Acerto de Contas</h3>
            <p id="valBalance">0,00 €</p>
        </div>
    </div>

    <div class="section" style="display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;">
        <div style="flex: 2; min-width: 200px;">
            <label>Procurar na Descrição</label>
            <input type="text" id="filterSearch" placeholder="Ex: Jantar, Luz, Renda..." oninput="renderAll()">
        </div>
        <div style="flex: 1; min-width: 150px;">
            <label>Visualizar Mês</label>
            <select id="filterMonth" onchange="renderAll()"></select>
        </div>
    </div>

    <div class="main-grid">
        <div class="left-col">
            <div class="section">
                <h2>⚙️ Configurações</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>Nome 1</label>
                        <input type="text" id="name1" onchange="saveConfig()">
                    </div>
                    <div class="form-group">
                        <label>Nome 2</label>
                        <input type="text" id="name2" onchange="saveConfig()">
                    </div>
                </div>
                
                <label>Categorias de Despesa</label>
                <div style="display:flex; gap:5px; margin-bottom: 5px;">
                    <input type="text" id="newCat" placeholder="Nova categoria">
                    <button class="btn-primary" style="width:45px; margin:0;" onclick="addItem('categories', 'newCat')">+</button>
                </div>
                <div id="listCats" class="list-manager"></div>

                <label style="margin-top:15px;">Gestão de Meses</label>
                <div style="display:flex; gap:5px; margin-bottom: 5px;">
                    <input type="text" id="newMonth" placeholder="Novo mês">
                    <button class="btn-primary" style="width:45px; margin:0;" onclick="addItem('months', 'newMonth')">+</button>
                </div>
                <div id="listMonths" class="list-manager"></div>
            </div>

            <div class="section">
                <h2>🎯 Definição de Metas</h2>
                <div id="budgetInputs" style="margin-bottom: 20px;"></div>
                <hr style="border:0; border-top:1px solid #eee; margin: 20px 0;">
                <div id="budgetStatus"></div>
            </div>
        </div>

        <div class="right-col">
            <div class="section">
                <h2>📝 Novo Registo</h2>
                <form id="financeForm">
                    <div class="form-row">
                        <div class="form-group small">
                            <label>Dia</label>
                            <input type="number" id="fDay" required min="1" max="31">
                        </div>
                        <div class="form-group">
                            <label>Mês</label>
                            <select id="fMonth"></select>
                        </div>
                        <div class="form-group">
                            <label>Categoria</label>
                            <select id="fCat"></select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Descrição da Despesa</label>
                            <input type="text" id="fDesc" placeholder="Onde foi gasto o dinheiro?" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Valor (€)</label>
                            <input type="number" step="0.01" id="fAmount" required>
                        </div>
                        <div class="form-group">
                            <label>Quem Pagou?</label>
                            <select id="fPayer"></select>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-primary">Guardar Despesa</button>
                </form>

                <div style="margin-top: 25px; display: flex; gap: 10px; flex-wrap: wrap;">
                    <button class="btn-outline" onclick="undoLast()">↩️ Anular Último</button>
                    <button class="btn-outline" onclick="downloadCSV()">📥 Exportar CSV</button>
                    <button class="btn-danger" style="margin-left: auto;" onclick="hardReset()">🧨 Limpar Tudo</button>
                </div>
            </div>

            <div class="section">
                <h2>📊 Gastos por Categoria</h2>
                <div style="height: 280px;">
                    <canvas id="expenseChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Categoria</th>
                    <th>Descrição</th>
                    <th>Valor</th>
                    <th>Pago por</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // Inicialização de Dados
    let data = JSON.parse(localStorage.getItem('fin_data')) || [];
    let config = JSON.parse(localStorage.getItem('fin_config')) || {
        name1: "Cátia",
        name2: "Gonçalo",
        categories: ["Casa", "Supermercado", "Lazer", "Transporte"],
        months: ["Janeiro", "Fevereiro", "Março"],
        budgets: {}
    };

    let myChart = null;

    // Função para salvar configurações de nomes e preferências
    function saveConfig() {
        config.name1 = document.getElementById('name1').value || "Pessoa 1";
        config.name2 = document.getElementById('name2').value || "Pessoa 2";
        localStorage.setItem('fin_config', JSON.stringify(config));
        renderAll();
    }

    // Atualiza o valor do orçamento de uma categoria
    function updateBudget(cat, val) {
        config.budgets[cat] = parseFloat(val) || 0;
        localStorage.setItem('fin_config', JSON.stringify(config));
        renderAll();
    }

    // Adiciona itens a listas (categorias ou meses)
    function addItem(type, inputId) {
        const val = document.getElementById(inputId).value.trim();
        if(val && !config[type].includes(val)) {
            config[type].push(val);
            document.getElementById(inputId).value = '';
            saveConfig();
        }
    }

    // Remove itens de listas
    function removeItem(type, index) {
        const item = config[type][index];
        if(confirm(`Deseja remover "${item}"?`)) {
            config[type].splice(index, 1);
            if(type === 'categories') delete config.budgets[item];
            saveConfig();
        }
    }

    // Reset total da aplicação
    function hardReset() {
        if(confirm("ATENÇÃO: Isto irá apagar TODOS os seus dados permanentemente.")) {
            if(confirm("Tem mesmo a certeza?")) {
                localStorage.clear();
                location.reload();
            }
        }
    }

    // Funções de manipulação de registos
    function undoLast() {
        if(data.length > 0) {
            data.pop();
            saveData();
        }
    }

    function deleteRecord(index) {
        data.splice(index, 1);
        saveData();
    }

    function saveData() {
        localStorage.setItem('fin_data', JSON.stringify(data));
        renderAll();
    }

    // Função Principal de Renderização (Desenha tudo no ecrã)
    function renderAll() {
        const selMonth = document.getElementById('filterMonth').value || 'all';
        const search = document.getElementById('filterSearch').value.toLowerCase();

        // Atualizar Nomes na UI
        document.getElementById('name1').value = config.name1;
        document.getElementById('name2').value = config.name2;
        document.getElementById('labelU1').innerText = config.name1;
        document.getElementById('labelU2').innerText = config.name2;

        // Renderizar listas de configuração
        document.getElementById('listCats').innerHTML = config.categories.map((c, i) => `
            <div class="list-row">
                <span class="badge">${c}</span>
                <button class="btn-danger" style="padding:2px 5px" onclick="removeItem('categories', ${i})">×</button>
            </div>
        `).join('');

        document.getElementById('listMonths').innerHTML = config.months.map((m, i) => `
            <div class="list-row">
                <span>${m}</span>
                <button class="btn-danger" style="padding:2px 5px" onclick="removeItem('months', ${i})">×</button>
            </div>
        `).join('');

        // Renderizar inputs de orçamentos
        document.getElementById('budgetInputs').innerHTML = config.categories.map(c => `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <small style="font-weight:600">${c}</small>
                <input type="number" value="${config.budgets[c] || 0}" onchange="updateBudget('${c}', this.value)" style="width:85px; padding:5px;">
            </div>
        `).join('');

        // Atualizar Dropdowns (Seletores)
        const mOpts = '<option value="all">Todos os Meses</option>' + config.months.map(m => `<option value="${m}">${m}</option>`).join('');
        const currentFilter = document.getElementById('filterMonth').value;
        document.getElementById('filterMonth').innerHTML = mOpts;
        document.getElementById('filterMonth').value = currentFilter || 'all';

        document.getElementById('fMonth').innerHTML = config.months.map(m => `<option value="${m}">${m}</option>`).join('');
        document.getElementById('fCat').innerHTML = config.categories.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('fPayer').innerHTML = `
            <option value="p1">${config.name1}</option>
            <option value="p2">${config.name2}</option>
        `;

        // Processamento de Dados (Tabela e Totais)
        let t1 = 0, t2 = 0;
        const catTotals = {};
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        data.forEach((r, i) => {
            const matchesMonth = (selMonth === 'all' || r.month === selMonth);
            const matchesSearch = r.description.toLowerCase().includes(search);

            if(matchesMonth && matchesSearch) {
                const amt = parseFloat(r.amount);
                if(r.payer === 'p1') t1 += amt; else t2 += amt;
                catTotals[r.category] = (catTotals[r.category] || 0) + amt;

                tbody.insertAdjacentHTML('afterbegin', `
                    <tr>
                        <td>${r.day} ${r.month}</td>
                        <td><span class="badge">${r.category}</span></td>
                        <td>${r.description}</td>
                        <td><strong>${amt.toFixed(2)}€</strong></td>
                        <td>${r.payer==='p1'?config.name1:config.name2}</td>
                        <td><button class="btn-danger" onclick="deleteRecord(${i})">🗑️</button></td>
                    </tr>
                `);
            }
        });

        // Atualizar Cards de Totais
        document.getElementById('valU1').innerText = t1.toFixed(2) + ' €';
        document.getElementById('valU2').innerText = t2.toFixed(2) + ' €';
        
        const bal = (t1 - t2) / 2;
        const balEl = document.getElementById('valBalance');
        if(bal > 0) {
            balEl.innerHTML = `<small>${config.name2} deve a ${config.name1}</small><br>${bal.toFixed(2)} €`;
        } else if(bal < 0) {
            balEl.innerHTML = `<small>${config.name1} deve a ${config.name2}</small><br>${Math.abs(bal).toFixed(2)} €`;
        } else {
            balEl.innerText = "Contas Certas";
        }

        // Renderizar Barras de Orçamento
        let bHtml = '';
        config.categories.forEach(c => {
            const limit = config.budgets[c] || 0;
            if(limit > 0) {
                const spent = catTotals[c] || 0;
                const perc = Math.min((spent/limit)*100, 100);
                bHtml += `
                    <div class="budget-card">
                        <div style="display:flex; justify-content:space-between; font-size:0.75rem; font-weight:bold;">
                            <span>${c}</span>
                            <span>${spent.toFixed(0)}€ / ${limit}€</span>
                        </div>
                        <div class="progress-bg">
                            <div class="progress-fill ${spent > limit ? 'over' : ''}" style="width:${perc}%"></div>
                        </div>
                    </div>`;
            }
        });
        document.getElementById('budgetStatus').innerHTML = bHtml || '<p style="font-size:0.8rem; color:#999; text-align:center;">Defina metas nas configurações para ver o progresso.</p>';

        updateChart(catTotals);
    }

    // Atualização do Gráfico Chart.js
    function updateChart(totals) {
        const ctx = document.getElementById('expenseChart').getContext('2d');
        if(myChart) myChart.destroy();
        
        const labels = Object.keys(totals);
        if(labels.length === 0) return;

        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: Object.values(totals),
                    backgroundColor: ['#4361ee', '#7209b7', '#4cc9f0', '#f72585', '#9b59b6', '#3f37c9', '#4895ef'],
                    borderWidth: 0
                }]
            },
            options: {
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { boxWidth: 12, font: { size: 11 }, usePointStyle: true }
                    }
                }
            }
        });
    }

    // Exportação para CSV
    function downloadCSV() {
        let csv = "\uFEFFData;Categoria;Descricao;Valor;Pago Por\n";
        data.forEach(r => {
            csv += `${r.day}/${r.month};${r.category};${r.description};${r.amount};${r.payer==='p1'?config.name1:config.name2}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "contas_familia_2026.csv";
        link.click();
    }

    // Submissão do Formulário
    document.getElementById('financeForm').onsubmit = (e) => {
        e.preventDefault();
        
        const newRecord = {
            day: document.getElementById('fDay').value,
            month: document.getElementById('fMonth').value,
            category: document.getElementById('fCat').value,
            description: document.getElementById('fDesc').value,
            amount: document.getElementById('fAmount').value,
            payer: document.getElementById('fPayer').value
        };

        data.push(newRecord);
        saveData();

        // Limpar formulário mantendo o mês para facilitar o próximo registo
        const currentMonth = document.getElementById('fMonth').value;
        e.target.reset();
        document.getElementById('fMonth').value = currentMonth;
        document.getElementById('fDay').focus();
    };

    // Renderização inicial
    renderAll();
</script>

</body>
</html>

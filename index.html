<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WalletFlow Pro 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #7209b7;
            --success: #4cc9f0;
            --danger: #f72585;
            --bg: #f8f9fc;
            --card-bg: #ffffff;
            --text-main: #2b2d42;
            --text-muted: #8d99ae;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            background-attachment: fixed;
            margin: 0; padding: 20px; color: var(--text-main);
        }

        .container { max-width: 1200px; margin: auto; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-weight: 700; color: var(--primary); letter-spacing: -1px; margin: 0; }

        /* Dashboard */
        .dashboard {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px; margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg); padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.8);
        }

        .card h3 { margin: 0; font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; }
        .card p { margin: 10px 0 0; font-size: 1.6rem; font-weight: 700; }
        .card.balance { background: var(--primary); color: white; }
        .card.balance h3, .card.balance p { color: white; }

        /* Layout */
        .main-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; margin-bottom: 30px; }
        .section { background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { font-size: 1.1rem; margin-top: 0; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 20px; }

        /* Forms */
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; font-weight: 600; margin-bottom: 5px; color: var(--text-muted); }
        input, select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 0.9rem; background: #f8fafc; }
        
        button { padding: 10px 18px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; width: 100%; justify-content: center; }
        .btn-danger { background: #fff5f5; color: #f56565; font-size: 0.8rem; }
        .btn-outline { background: transparent; border: 1px solid #e2e8f0; color: var(--text-muted); font-size: 0.8rem; }

        /* Gestão de Listas */
        .list-manager { max-height: 150px; overflow-y: auto; background: #fbfcfe; padding: 10px; border-radius: 10px; border: 1px solid #edf2f7; margin-top: 5px; }
        .list-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #f1f5f9; }

        /* Tabela */
        .table-container { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 15px; text-align: left; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; }
        .badge-cat { background: #e0e7ff; color: #4338ca; }

        /* Orçamentos */
        .budget-card { margin-bottom: 15px; padding: 10px; border-radius: 12px; background: #f8fafc; }
        .progress-bg { background: #e2e8f0; height: 8px; border-radius: 4px; margin: 8px 0; }
        .progress-fill { height: 100%; border-radius: 4px; background: var(--success); width: 0%; }
        .progress-fill.over { background: var(--danger); }

        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header><h1>WalletFlow 2026</h1></header>

    <div class="dashboard">
        <div class="card" style="border-left: 5px solid #9b59b6;"><h3 id="labelU1">Pessoa 1</h3><p id="valU1">0,00 €</p></div>
        <div class="card" style="border-left: 5px solid var(--primary);"><h3 id="labelU2">Pessoa 2</h3><p id="valU2">0,00 €</p></div>
        <div class="card balance"><h3 id="labelBalance">Acerto de Contas</h3><p id="valBalance">0,00 €</p></div>
    </div>

    <div class="section" style="display: flex; gap: 15px; align-items: center; padding: 15px;">
        <input type="text" id="filterSearch" placeholder="Procurar registo..." style="flex: 2;" oninput="renderAll()">
        <select id="filterMonth" style="flex: 1;" onchange="renderAll()"></select>
    </div>

    <div class="main-grid">
        <div class="left-col">
            <div class="section">
                <h2>⚙️ Configurações</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                    <div><label>Nome 1</label><input type="text" id="name1" onchange="saveConfig()"></div>
                    <div><label>Nome 2</label><input type="text" id="name2" onchange="saveConfig()"></div>
                </div>
                
                <label>Adicionar Categoria</label>
                <div style="display:flex; gap:5px; margin-bottom: 10px;">
                    <input type="text" id="newCat" placeholder="Ex: Renda"><button class="btn-primary" style="width:50px" onclick="addItem('categories', 'newCat')">+</button>
                </div>
                <div id="listCats" class="list-manager"></div>

                <label style="margin-top:15px;">Adicionar Mês</label>
                <div style="display:flex; gap:5px; margin-bottom: 10px;">
                    <input type="text" id="newMonth" placeholder="Ex: Abril"><button class="btn-primary" style="width:50px" onclick="addItem('months', 'newMonth')">+</button>
                </div>
                <div id="listMonths" class="list-manager"></div>
            </div>

            <div class="section">
                <h2>🎯 Orçamentos Mensais</h2>
                <div id="budgetInputs" style="margin-bottom: 20px;"></div>
                <div id="budgetStatus"></div>
            </div>
        </div>

        <div class="right-col">
            <div class="section">
                <h2>📝 Novo Registo</h2>
                <form id="financeForm">
                    <div style="display: grid; grid-template-columns: 1fr 2fr 2fr; gap: 10px; margin-bottom: 10px;">
                        <input type="number" id="fDay" placeholder="Dia" required min="1" max="31">
                        <select id="fMonth"></select>
                        <select id="fCat"></select>
                    </div>
                    <input type="text" id="fDesc" placeholder="Descrição da despesa" required style="margin-bottom: 10px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                        <input type="number" step="0.01" id="fAmount" placeholder="Valor (€)" required>
                        <select id="fPayer"></select>
                    </div>
                    <button type="submit" class="btn-primary">Guardar Despesa</button>
                </form>
                <div style="margin-top: 15px; display: flex; gap: 10px;">
                    <button class="btn-outline" onclick="undoLast()">↩️ Anular</button>
                    <button class="btn-outline" onclick="downloadCSV()">📥 Exportar</button>
                    <button class="btn-danger" style="margin-left: auto;" onclick="hardReset()">🧨 Limpar Tudo</button>
                </div>
            </div>

            <div class="section">
                <h2>📊 Gastos por Categoria</h2>
                <div style="height: 250px;"><canvas id="expenseChart"></canvas></div>
            </div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Categoria</th>
                    <th>Descrição</th>
                    <th>Valor</th>
                    <th>Pago por</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('fin_data')) || [];
    let config = JSON.parse(localStorage.getItem('fin_config')) || {
        name1: "Cátia",
        name2: "Gonçalo",
        categories: ["Casa", "Supermercado", "Lazer", "Transporte"],
        months: ["Janeiro", "Fevereiro", "Março"],
        budgets: {}
    };

    let myChart = null;

    function saveConfig() {
        config.name1 = document.getElementById('name1').value || "Pessoa 1";
        config.name2 = document.getElementById('name2').value || "Pessoa 2";
        localStorage.setItem('fin_config', JSON.stringify(config));
        renderAll();
    }

    function updateBudget(cat, val) {
        config.budgets[cat] = parseFloat(val) || 0;
        localStorage.setItem('fin_config', JSON.stringify(config));
        renderAll();
    }

    function addItem(type, inputId) {
        const val = document.getElementById(inputId).value.trim();
        if(val && !config[type].includes(val)) {
            config[type].push(val);
            document.getElementById(inputId).value = '';
            saveConfig();
        }
    }

    function removeItem(type, index) {
        const item = config[type][index];
        if(confirm(`Remover "${item}"?`)) {
            config[type].splice(index, 1);
            if(type === 'categories') delete config.budgets[item];
            saveConfig();
        }
    }

    function hardReset() {
        if(confirm("Apagar todos os dados e definições?") && confirm("Certeza absoluta?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function undoLast() { if(data.length > 0) { data.pop(); saveData(); } }
    function deleteRecord(index) { data.splice(index, 1); saveData(); }
    function saveData() { localStorage.setItem('fin_data', JSON.stringify(data)); renderAll(); }

    function renderAll() {
        const selMonth = document.getElementById('filterMonth').value || 'all';
        const search = document.getElementById('filterSearch').value.toLowerCase();

        // Config UI
        document.getElementById('name1').value = config.name1;
        document.getElementById('name2').value = config.name2;
        document.getElementById('labelU1').innerText = config.name1;
        document.getElementById('labelU2').innerText = config.name2;

        // Listas de Gestão
        document.getElementById('listCats').innerHTML = config.categories.map((c, i) => `
            <div class="list-row"><span class="badge badge-cat">${c}</span><button class="btn-danger" style="padding:2px 5px" onclick="removeItem('categories', ${i})">×</button></div>
        `).join('');

        document.getElementById('listMonths').innerHTML = config.months.map((m, i) => `
            <div class="list-row"><span>${m}</span><button class="btn-danger" style="padding:2px 5px" onclick="removeItem('months', ${i})">×</button></div>
        `).join('');

        // Orçamentos (Inputs)
        document.getElementById('budgetInputs').innerHTML = config.categories.map(c => `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <small style="font-weight:600">${c}</small>
                <input type="number" value="${config.budgets[c] || 0}" onchange="updateBudget('${c}', this.value)" style="width:80px; padding:5px;">
            </div>
        `).join('');

        // Dropdowns
        const mOpts = '<option value="all">Todos os Meses</option>' + config.months.map(m => `<option value="${m}">${m}</option>`).join('');
        const prevM = document.getElementById('filterMonth').value;
        document.getElementById('filterMonth').innerHTML = mOpts;
        document.getElementById('filterMonth').value = prevM || 'all';

        document.getElementById('fMonth').innerHTML = config.months.map(m => `<option value="${m}">${m}</option>`).join('');
        document.getElementById('fCat').innerHTML = config.categories.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('fPayer').innerHTML = `<option value="p1">${config.name1}</option><option value="p2">${config.name2}</option>`;

        // Processamento de Dados
        let t1 = 0, t2 = 0;
        const catTotals = {};
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        data.forEach((r, i) => {
            const matchMonth = (selMonth === 'all' || r.month === selMonth);
            const matchSearch = r.description.toLowerCase().includes(search);

            if(matchMonth && matchSearch) {
                const amt = parseFloat(r.amount);
                if(r.payer === 'p1') t1 += amt; else t2 += amt;
                catTotals[r.category] = (catTotals[r.category] || 0) + amt;

                tbody.insertAdjacentHTML('afterbegin', `
                    <tr>
                        <td>${r.day} ${r.month}</td>
                        <td><span class="badge badge-cat">${r.category}</span></td>
                        <td>${r.description}</td>
                        <td><strong>${amt.toFixed(2)}€</strong></td>
                        <td>${r.payer==='p1'?config.name1:config.name2}</td>
                        <td><button class="btn-danger" onclick="deleteRecord(${i})">🗑️</button></td>
                    </tr>
                `);
            }
        });

        // Totais e Acerto
        document.getElementById('valU1').innerText = t1.toFixed(2) + ' €';
        document.getElementById('valU2').innerText = t2.toFixed(2) + ' €';
        const bal = (t1 - t2) / 2;
        const balEl = document.getElementById('valBalance');
        if(bal > 0) balEl.innerHTML = `<small>${config.name2} deve</small><br>${bal.toFixed(2)} €`;
        else if(bal < 0) balEl.innerHTML = `<small>${config.name1} deve</small><br>${Math.abs(bal).toFixed(2)} €`;
        else balEl.innerText = "0,00 €";

        // Status dos Orçamentos
        let bHtml = '';
        config.categories.forEach(c => {
            const limit = config.budgets[c] || 0;
            if(limit > 0) {
                const spent = catTotals[c] || 0;
                const perc = Math.min((spent/limit)*100, 100);
                bHtml += `
                    <div class="budget-card">
                        <div style="display:flex; justify-content:space-between; font-size:0.75rem; font-weight:bold;"><span>${c}</span><span>${spent.toFixed(0)}€ / ${limit}€</span></div>
                        <div class="progress-bg"><div class="progress-fill ${spent > limit ? 'over' : ''}" style="width:${perc}%"></div></div>
                    </div>`;
            }
        });
        document.getElementById('budgetStatus').innerHTML = bHtml;

        updateChart(catTotals);
    }

    function updateChart(totals) {
        const ctx = document.getElementById('expenseChart').getContext('2d');
        if(myChart) myChart.destroy();
        const labels = Object.keys(totals);
        if(labels.length === 0) return;
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: Object.values(totals),
                    backgroundColor: ['#4361ee', '#7209b7', '#4cc9f0', '#f72585', '#9b59b6', '#3f37c9'],
                    borderWidth: 0
                }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } } }
        });
    }

    function downloadCSV() {
        let csv = "\uFEFFData;Categoria;Descricao;Valor;Quem Pagou\n";
        data.forEach(r => csv += `${r.day}/${r.month};${r.category};${r.description};${r.amount};${r.payer==='p1'?config.name1:config.name2}\n`);
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
        link.download = "financas_2026.csv";
        link.click();
    }

    document.getElementById('financeForm').onsubmit = (e) => {
        e.preventDefault();
        data.push({
            day: document.getElementById('fDay').value, month: document.getElementById('fMonth').value,
            category: document.getElementById('fCat').value, description: document.getElementById('fDesc').value,
            amount: document.getElementById('fAmount').value, payer: document.getElementById('fPayer').value
        });
        saveData();
        const m = document.getElementById('fMonth').value;
        e.target.reset();
        document.getElementById('fMonth').value = m;
    };

    renderAll();
</script>
</body>
</html>
